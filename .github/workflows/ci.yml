name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd server
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pipeline on all input CSVs
        run: |
          cd server
          python src/pipeline.py --dir input --output output

      - name: Run tests with coverage
        run: |
          cd server
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=html:logs/htmlcov

      - name: Upload pipeline logs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: server/logs/pipeline_execution.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: server/logs/htmlcov
