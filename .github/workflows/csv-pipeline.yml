name: CSV Processing Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'server/input/**/*.csv'
      - 'server/src/**/*.py'
      - '.github/workflows/csv-pipeline.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server/input/**/*.csv'
      - 'server/src/**/*.py'
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'CSV file to process (relative to server/input/)'
        required: false
        default: 'all'

jobs:
  process-csv:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd server
        pip install -r requirements.txt
    
    - name: Create output directory
      run: |
        mkdir -p server/output
    
    - name: Process CSV files
      id: process
      run: |
        cd server/src
        
        if [ "${{ github.event.inputs.csv_file }}" == "all" ] || [ -z "${{ github.event.inputs.csv_file }}" ]; then
          echo "Processing all CSV files in input directory..."
          python pipeline.py --dir ../input --output ../output
        else
          echo "Processing specific file: ${{ github.event.inputs.csv_file }}"
          python pipeline.py "../input/${{ github.event.inputs.csv_file }}" --output ../output
        fi
      continue-on-error: false
    
    - name: Run tests
      if: always()
      run: |
        cd server
        pytest tests/ -v --cov=src --cov-report=term-missing
      continue-on-error: false

    - name: Upload pipeline logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-logs
        path: server/logs/pipeline_execution.log
        retention-days: 30

    - name: Upload processing results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: csv-processing-results
        path: |
          server/output/*.csv
          server/output/*.json
        retention-days: 30

    - name: Generate processing summary
      if: always()
      run: |
        cd server/output
        echo "## CSV Processing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
        ls -lh *.csv *.json 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quality Reports:" >> $GITHUB_STEP_SUMMARY
        if [ -f "*_quality_report.csv" ]; then
          head -n 10 *_quality_report.csv >> $GITHUB_STEP_SUMMARY
        fi
    
