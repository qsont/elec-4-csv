name: CSV Processing Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'server/input/**/*.csv'
      - 'server/src/**/*.py'
      - '.github/workflows/csv-pipeline.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server/input/**/*.csv'
      - 'server/src/**/*.py'
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'CSV file to process (relative to server/input/)'
        required: false
        default: 'all'

jobs:
  process-csv:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'server/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd server
        pip install -r requirements.txt
    
    - name: Create output directory
      run: |
        mkdir -p server/output
    
    - name: Process CSV files
      id: process
      run: |
        cd server/src
        
        if [ "${{ github.event.inputs.csv_file }}" == "all" ] || [ -z "${{ github.event.inputs.csv_file }}" ]; then
          echo "Processing all CSV files in input directory..."
          python pipeline.py --dir ../input --output ../output
        else
          echo "Processing specific file: ${{ github.event.inputs.csv_file }}"
          python pipeline.py "../input/${{ github.event.inputs.csv_file }}" --output ../output
        fi
      continue-on-error: false
    
    - name: Run tests
      if: always()
      run: |
        cd server
        pytest tests/ -v --cov=src --cov-report=term-missing
      continue-on-error: false

    - name: Upload pipeline logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-logs
        path: server/logs/pipeline_execution.log
        retention-days: 30

    - name: Upload processing results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: csv-processing-results
        path: |
          server/output/*.csv
          server/output/*.json
        retention-days: 30

    - name: Generate processing summary
      if: always()
      run: |
        cd server/output
        echo "## CSV Processing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
        ls -lh *.csv *.json 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quality Reports:" >> $GITHUB_STEP_SUMMARY
        if [ -f "*_quality_report.csv" ]; then
          head -n 10 *_quality_report.csv >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Append logs to persistent history
      if: always()
      run: |
        # Capture the log content while still on the main branch
        LOG_CONTENT=""
        if [ -f "server/logs/pipeline_execution.log" ]; then
          LOG_CONTENT=$(cat server/logs/pipeline_execution.log)
        else
          LOG_CONTENT="Log file not found at server/logs/pipeline_execution.log"
        fi
        
        # Configure git
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        # Fetch the remote history branch if it exists
        if git rev-parse --verify origin/ci-history > /dev/null 2>&1; then
          git fetch origin ci-history:ci-history --force
          git checkout ci-history
          # Rebase to ensure we're on top of any remote changes
          git rebase origin/ci-history || true
        else
          # Create orphan branch only if it doesn't exist remotely
          git checkout --orphan ci-history
          git rm -rf . 2>/dev/null || true
        fi
        
        # Ensure history.log exists
        if [ ! -f "history.log" ]; then
          echo "# Pipeline Execution History" > history.log
        fi
        
        # Append execution log with metadata
        echo "" >> history.log
        echo "---" >> history.log
        echo "Run ID: ${{ github.run_id }}" >> history.log
        echo "Run Number: ${{ github.run_number }}" >> history.log
        echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> history.log
        echo "Branch: ${{ github.ref_name }}" >> history.log
        echo "Commit: ${{ github.sha }}" >> history.log
        echo "Actor: ${{ github.actor }}" >> history.log
        echo "---" >> history.log
        echo "$LOG_CONTENT" >> history.log
        
        # Commit if there are changes (handle both orphan and existing branches)
        if git add history.log && git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Add pipeline execution log from run #${{ github.run_number }}"
          # Use force-with-lease for safety but allow orphan overwrite
          git push origin ci-history --force-with-lease=ci-history:refs/heads/ci-history || git push origin ci-history --force
        fi
    
    # Optional: Uncomment to commit results back to repository
    # Requires write permissions and proper git configuration
